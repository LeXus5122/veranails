<style>
  :root{
    --candy:#ff79c1; --orchid:#a35ce8; --deep:#6d2fbf;
    --cream:#fff6fb; --berry:#43104f; --sun:#ffd447; --mint:#2fd6a8;
    --shadow:0 8px 24px rgba(80,10,90,.28);
    --safe-t:max(env(safe-area-inset-top,0px), 22px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;position:fixed;width:100%;overscroll-behavior:none}
  body{
    font-family:ui-rounded,-apple-system,"SF Pro Rounded",system-ui,sans-serif;
    background:linear-gradient(170deg,var(--candy),var(--orchid) 70%,var(--deep));
    color:var(--berry);
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  }
  #cv{position:fixed;inset:0;display:block;touch-action:none}
  #ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column}
  #ui>*{pointer-events:none}
  button{font-family:inherit;border:none;cursor:pointer;touch-action:manipulation}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute;top:calc(var(--safe-t) + 10px);left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;padding:0 14px;
  }
  #clientChip{pointer-events:none;display:flex;align-items:flex-end;gap:0;position:relative}
  #ava{
    width:64px;height:64px;border-radius:50%;background:linear-gradient(160deg,#ffe3f2,#ffc2e2);
    border:3px solid #fff;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;font-size:38px;
  }
  #bubble{
    background:#fff;border-radius:20px 20px 20px 6px;padding:8px 12px;margin-left:-6px;margin-bottom:34px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;
    animation:bob 2.6s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  #bubble .lbl{font-size:11px;font-weight:800;color:#b04a8f;line-height:1.15;text-align:center}
  #wishNail{
    width:26px;height:38px;border-radius:13px 13px 9px 9px;
    border:2px solid rgba(255,255,255,.9);box-shadow:0 2px 6px rgba(0,0,0,.18);
  }
  #coinPill{
    background:var(--cream);border-radius:999px;padding:8px 14px 8px 12px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:6px;font-weight:900;font-size:19px;
    font-variant-numeric:tabular-nums;color:var(--berry);
  }
  #coinPill .c{font-size:20px}
  #coinPill.pop{animation:coinpop .45s ease}
  @keyframes coinpop{30%{transform:scale(1.22)}}

  #sndBtn,#homeBtn{
    pointer-events:auto;position:absolute;right:14px;
    width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.35);
    font-size:19px;box-shadow:0 3px 10px rgba(80,10,90,.2);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  }
  #sndBtn{top:calc(var(--safe-t) + 88px)}
  #homeBtn{top:calc(var(--safe-t) + 136px);display:none}
  #sndBtn:active,#homeBtn:active{transform:scale(.9)}

  /* ---------- progress dots ---------- */
  #stepDots{
    position:absolute;top:calc(var(--safe-t) + 92px);left:50%;transform:translateX(-50%);
    display:flex;gap:8px;
  }
  .dot{
    width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.28);
    display:flex;align-items:center;justify-content:center;font-size:14px;
    filter:grayscale(1);opacity:.65;transition:all .3s;
  }
  .dot.cur{background:#fff;filter:none;opacity:1;transform:scale(1.18);box-shadow:0 4px 12px rgba(80,10,90,.3)}
  .dot.done{background:var(--mint);filter:none;opacity:1}

  /* ---------- bottom dock ---------- */
  #dock{
    position:absolute;left:0;right:0;bottom:0;padding:10px 0 calc(var(--safe-b) + 10px);
    background:linear-gradient(to top,rgba(255,246,251,.97) 78%,rgba(255,246,251,0));
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:transform .35s ease;
  }
  #dock.hid{transform:translateY(110%)}
  #stepLabel{font-size:21px;font-weight:900;letter-spacing:.2px;text-shadow:0 1px 0 #fff}
  #stepHint{font-size:13px;font-weight:700;color:#a45a92}
  #shelf{
    pointer-events:auto;
    display:flex;gap:10px;overflow-x:auto;max-width:100%;padding:8px 16px 6px;
    touch-action:pan-x;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  #shelf::-webkit-scrollbar{display:none}
  .item{
    pointer-events:auto;position:relative;flex:0 0 auto;width:64px;height:82px;border-radius:18px;
    background:#fff;box-shadow:0 4px 12px rgba(80,10,90,.16);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    transition:transform .18s ease,box-shadow .18s ease;border:3px solid transparent;
  }
  .item.sel{transform:translateY(-8px) scale(1.06);border-color:var(--sun);box-shadow:0 10px 22px rgba(80,10,90,.3)}
  .item .em{font-size:34px;line-height:1}
  .item .nm{font-size:9px;font-weight:800;color:#b04a8f}
  .item.lock{filter:grayscale(.85);opacity:.8}
  .item.lock .price{
    position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    background:var(--sun);color:#6b4a00;font-size:10px;font-weight:900;border-radius:999px;
    padding:2px 8px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .item.shake{animation:shake .4s}
  @keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

  #doneBtn{
    pointer-events:auto;display:none;margin-top:2px;
    background:linear-gradient(180deg,#4ff0c0,var(--mint));color:#04543c;
    font-size:19px;font-weight:900;padding:13px 42px;border-radius:999px;
    box-shadow:0 6px 0 #17a67c,0 12px 24px rgba(23,166,124,.4);
    animation:pulse 1.6s ease-in-out infinite;
  }
  #doneBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #17a67c}
  @keyframes pulse{50%{transform:scale(1.05)}}

  /* ---------- tutorial hand ---------- */
  #tut{position:absolute;font-size:52px;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));display:none;z-index:5}
  #tut.tap{display:block;animation:tapA 1s ease-in-out infinite}
  #tut.slideX{display:block;animation:slideXA 1.3s ease-in-out infinite}
  #tut.slideY{display:block;animation:slideYA 1.3s ease-in-out infinite}
  @keyframes tapA{0%,100%{transform:scale(1) translateY(0)}40%{transform:scale(.78) translateY(8px)}}
  @keyframes slideXA{0%,100%{transform:translateX(-46px)}50%{transform:translateX(46px)}}
  @keyframes slideYA{0%,100%{transform:translateY(34px)}50%{transform:translateY(-44px)}}

  #toast{
    position:absolute;left:50%;bottom:220px;transform:translateX(-50%) translateY(20px);
    background:rgba(67,16,79,.9);color:#fff;font-weight:800;font-size:14px;
    padding:10px 20px;border-radius:999px;opacity:0;transition:all .3s;white-space:nowrap;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- screens ---------- */
  .scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    transition:opacity .45s ease,visibility .45s;}
  .scr.hid{opacity:0;visibility:hidden}

  #titleScr{
    pointer-events:auto;justify-content:center;gap:8px;
    background:linear-gradient(160deg,#ff8fcb,#c76df0 55%,#7a3ad0);
    background-size:100% 130%;animation:bgshift 8s ease-in-out infinite alternate;
  }
  @keyframes bgshift{to{background-position:0 100%}}
  .spark{position:absolute;font-size:22px;opacity:.85;animation:floatUp linear infinite}
  @keyframes floatUp{from{transform:translateY(30px) scale(.7);opacity:0}
    15%{opacity:.9}85%{opacity:.9}to{transform:translateY(-105vh) scale(1.15);opacity:0}}
  #logoNail{font-size:88px;filter:drop-shadow(0 10px 18px rgba(60,0,70,.4));animation:bob 3s ease-in-out infinite}
  #titleScr h1{
    font-size:52px;font-weight:900;color:#fff;letter-spacing:1px;text-align:center;line-height:.98;
    text-shadow:0 3px 0 #e550a2,0 6px 0 #b23a86,0 14px 30px rgba(60,0,70,.45);
  }
  #titleScr .sub{font-size:16px;font-weight:800;color:#ffe3f5;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
  #playBtn{
    margin-top:34px;background:linear-gradient(180deg,#ffe470,var(--sun));color:#6b4a00;
    font-size:26px;font-weight:900;padding:18px 64px;border-radius:999px;letter-spacing:1px;
    box-shadow:0 7px 0 #d9a916,0 16px 34px rgba(90,50,0,.35);animation:pulse 1.8s ease-in-out infinite;
  }
  #playBtn:active{transform:translateY(5px);box-shadow:0 2px 0 #d9a916}
  #titleCoins{margin-top:22px;color:#fff;font-weight:900;font-size:17px;background:rgba(255,255,255,.22);
    padding:8px 18px;border-radius:999px;font-variant-numeric:tabular-nums;
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}

  #resultScr{pointer-events:auto;justify-content:space-between;padding:calc(var(--safe-t) + 26px) 20px calc(var(--safe-b) + 24px)}
  #resTop{display:flex;flex-direction:column;align-items:center;gap:10px}
  #stars{display:flex;gap:10px;height:64px}
  .star{font-size:54px;filter:drop-shadow(0 4px 8px rgba(90,40,0,.4));transform:scale(0);transition:transform .4s cubic-bezier(.34,1.8,.5,1)}
  .star.on{transform:scale(1)}
  .star.off{filter:grayscale(1);opacity:.35;transform:scale(.8)}

<script>
'use strict';
/* ---- гарантируем корректный viewport (работает и в standalone, и если страницу обернули) ---- */
(function(){
  const want='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover';
  let m=document.querySelector('meta[name=viewport]');
  if(!m){m=document.createElement('meta');m.name='viewport';document.head.appendChild(m);}
  if(m.content!==want)m.content=want;
})();
/* ---- polyfill: roundRect отсутствует в iOS Safari <16.4 ---- */
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const m=Math.min(Math.abs(w),Math.abs(h))/2;
    let rr=typeof r==='number'?r:(Array.isArray(r)?r[0]:0);rr=Math.min(rr,m);
    this.moveTo(x+rr,y);
    this.arcTo(x+w,y,x+w,y+h,rr);
    this.arcTo(x+w,y+h,x,y+h,rr);
    this.arcTo(x,y+h,x,y,rr);
    this.arcTo(x,y,x+w,y,rr);
    this.closePath();return this;
  };
}
/* ================= helpers ================= */
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ================= save ================= */
const SKEY='nailsStudio_v1';
let save={coins:100,served:0,muted:false,up:[0,1,2,3,4,5],ug:[0,1,2,3],ud:[0,1,2,3,4,5]};
try{const s=JSON.parse(localStorage.getItem(SKEY));if(s&&typeof s.coins==='number')save=Object.assign(save,s);}catch(e){}
function store(){try{localStorage.setItem(SKEY,JSON.stringify(save));}catch(e){}}

/* ================= data ================= */
const POLISH=[
  {n:'Розовый', c:'#ff5fa8',c2:'#ff9cce',price:0},
  {n:'Красный', c:'#ef2d56',c2:'#ff7b96',price:0},
  {n:'Сирень',  c:'#9d5ce8',c2:'#c9a0f7',price:0},
  {n:'Небо',    c:'#3fb4f5',c2:'#8fd8ff',price:0},
  {n:'Мята',    c:'#22cfa0',c2:'#84eccf',price:0},
  {n:'Персик',  c:'#ff9455',c2:'#ffc79a',price:0},
  {n:'Золото',  c:'#f0b62e',c2:'#ffe07a',price:150,gold:true},
  {n:'Единорог',c:'#ff7ad9',c2:'#7ab8ff',price:250,unicorn:true},
  {n:'Ночь',    c:'#3a3357',c2:'#7a6fb0',price:350},
];
const GLITTER=[
  {n:'Серебро',c:'#ffffff',price:0},
  {n:'Золото', c:'#ffd76b',price:0},
  {n:'Розовый',c:'#ff9ad2',price:0},
  {n:'Радуга', c:'rainbow',price:0},
  {n:'Лёд',    c:'#9fe0ff',price:120},
];
const DECOR=[
  {e:'💎',price:0},{e:'⭐',price:0},{e:'🌸',price:0},
  {e:'💖',price:0},{e:'🦋',price:0},{e:'🍓',price:0},
  {e:'👑',price:100},{e:'🌈',price:150},
];
const NAMES=['Соня','Мила','Ева','Лиза','Аня','Кира','Юля','Настя','Варя','Даша'];
const AVAS=['👧🏼','👩🏻','👧🏽','👩🏼','👧🏻','👩🏽','👱🏻‍♀️','👩🏻‍🦰'];
const STEPS=[
  {ic:'✂️',lbl:'✂️ Подстриги ноготок!',hint:'Нажимай на кончик ногтя'},
  {ic:'🧽',lbl:'🧽 Подпили пилочкой!',hint:'Води пальчиком влево-вправо'},
  {ic:'💅',lbl:'💅 Покрась лаком!',hint:'Выбери цвет и закрась ноготь'},
  {ic:'✨',lbl:'✨ Посыпь блёстками!',hint:'Выбери блёстки и води по ногтю'},
  {ic:'💎',lbl:'💎 Укрась!',hint:'Выбирай наклейки и нажимай на ноготь'},
];

/* ================= audio ================= */
let AC=null;
function ac(){
  try{
    if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state!=='running')AC.resume();  // ловит и 'suspended', и WebKit 'interrupted'
    return AC;
  }catch(e){return null;}
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&AC&&AC.state!=='running'){try{AC.resume();}catch(e){}}
});
function tone(f,d,type,v,f2){
  if(save.muted)return;const a=ac();if(!a)return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(f,a.currentTime);
    if(f2)o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+d);
    g.gain.setValueAtTime(v||.12,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d+.02);
  }catch(e){}
}
function hiss(d,v,fc){
  if(save.muted)return;const a=ac();if(!a)return;
  try{
    const n=Math.floor(a.sampleRate*d),buf=a.createBuffer(1,n,a.sampleRate),ch=buf.getChannelData(0);
    for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1)*(1-i/n);
    const src=a.createBufferSource();src.buffer=buf;
    const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=fc||2500;fl.Q.value=.8;
    const g=a.createGain();g.gain.value=v||.2;
    src.connect(fl);fl.connect(g);g.connect(a.destination);src.start();
  }catch(e){}
}
const sfx={
  snip(){hiss(.07,.3,3200);tone(180,.08,'square',.06,120);},
  file(){hiss(.09,.10,1800);},
  pop(){tone(520,.09,'sine',.14,880);},
  place(){tone(760,.12,'triangle',.16,1200);},
  sparkle(){tone(rand(1400,2400),.15,'sine',.07,rand(2400,3400));},
  done(){[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.22,'triangle',.16),i*90));},
  coin(){tone(1318,.09,'square',.06,1760);},
  unlock(){[659,880,1108,1318].forEach((f,i)=>setTimeout(()=>tone(f,.2,'triangle',.14),i*80));},
  fanfare(){[523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>tone(f,.3,'triangle',.16),i*120));},
  err(){tone(220,.18,'sawtooth',.08,160);},
};

/* ================= canvas ================= */
const cv=$('#cv'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
/* nail unit space */
const UW=384,UH=512;
const nailPath=new Path2D(
  'M30 470 C10 430 6 300 10 170 C14 60 90 18 192 18 C294 18 370 60 374 170 C378 300 374 430 344 470 C300 505 84 505 30 470 Z'
);
const pcv=document.createElement('canvas');pcv.width=UW;pcv.height=UH;
const pctx=pcv.getContext('2d');
/* coverage grid */
const GX=12,GY=16,CW=UW/GX,CH=UH/GY;
const insideCell=[];let insideTotal=0;
for(let gy=0;gy<GY;gy++)for(let gx=0;gx<GX;gx++){
  const inp=pctx.isPointInPath(nailPath,(gx+.5)*CW,(gy+.5)*CH);
  insideCell.push(inp);if(inp)insideTotal++;
}
let paintedCell=new Array(GX*GY).fill(false);

let L={};// layout
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);
  cv.style.width=W+'px';cv.style.height=H+'px';
  const fw=clamp(W*0.5,150,270);
  const tipY=H*0.30;
  const nw=fw*0.62,nh=nw*1.3;
  L={fw,tipY,cx:W/2,nw,nh,nx:W/2-nw/2,ny:tipY+fw*0.115,extraMax:fw*0.30};
}
window.addEventListener('resize',resize);resize();

/* jag noise (stable per client) */
let jag=[];function rollJag(){jag=[];for(let i=0;i<16;i++)jag.push(Math.random());}
rollJag();

/* ================= state ================= */
let screen='title'; // title | salon | result
let step=0;
let client=null;
let nail=null;
let particles=[];
let bokeh=[];
let shineT=-1;          // 0..1 sweep
let stepLock=false;     // during advance animation
let lastClipT=0,lastFileSfx=0;
let handDesign=null;    // result screen prerolled glitter dots
let resultStars=0;

for(let i=0;i<14;i++)bokeh.push({x:Math.random(),y:Math.random(),r:rand(20,70),s:rand(6,18),a:rand(.04,.10)});

function newClient(){
  client={
    name:pick(NAMES),ava:pick(AVAS),
    wishP:Math.floor(Math.random()*6),
    wishG:Math.floor(Math.random()*4),
  };
  nail={
    extra:1,clips:3,rough:1,fileAcc:0,
    polishIdx:-1,polished:false,
    glitterIdx:-1,glitterN:0,glittered:false,
    decors:[],
  };
  pctx.clearRect(0,0,UW,UH);
  paintedCell.fill(false);
  shineT=-1;rollJag();
  /* client chip */
  $('#ava').textContent=client.ava;
  const wp=POLISH[client.wishP],wg=GLITTER[client.wishG];
  const gc=wg.c==='rainbow'?'#fff':wg.c;
  $('#wishNail').style.background=
    `radial-gradient(circle at 30% 30%, ${gc} 1.2px, transparent 1.6px),`+
    `radial-gradient(circle at 70% 60%, ${gc} 1.2px, transparent 1.6px),`+
    `radial-gradient(circle at 45% 80%, ${gc} 1.2px, transparent 1.6px),`+
    `linear-gradient(180deg,${wp.c2},${wp.c})`;
}

/* ================= UI builders ================= */
function updCoins(anim){
  $('#coinN').textContent=save.coins;
  $('#titleCoinN').textContent=save.coins;
  $('#servedN').textContent=save.served;
  if(anim){const p=$('#coinPill');p.classList.remove('pop');void p.offsetWidth;p.classList.add('pop');}
}
function buildDots(){
  const d=$('#stepDots');d.innerHTML='';
  STEPS.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='dot'+(i<step?' done':i===step?' cur':'');
    el.textContent=i<step?'✓':s.ic;
    d.appendChild(el);
  });
}
function svgBottle(c,c2){
  return `<svg width="40" height="54" viewBox="0 0 48 64">
    <rect x="17" y="1" width="14" height="15" rx="4" fill="#3a2a55"/>
    <rect x="21" y="12" width="6" height="10" fill="#3a2a55"/>
    <path d="M10 27 Q10 20 17 20 L31 20 Q38 20 38 27 L38 53 Q38 62 29 62 L19 62 Q10 62 10 53 Z" fill="url(#g${c.slice(1)})"/>
    <defs><linearGradient id="g${c.slice(1)}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c2}"/><stop offset="1" stop-color="${c}"/></linearGradient></defs>
    <ellipse cx="17" cy="38" rx="3.4" ry="9" fill="rgba(255,255,255,.5)"/>
  </svg>`;
}
function svgJar(c){
  const dot=c==='rainbow'?['#ff6b6b','#ffd93d','#6bcB77','#4d96ff','#c77dff']:[c,c,c,c,c];
  let dots='';
  for(let i=0;i<14;i++)dots+=`<circle cx="${rand(13,35)}" cy="${rand(26,54)}" r="${rand(1.2,2.4)}" fill="${dot[i%5]}"/>`;
  return `<svg width="40" height="54" viewBox="0 0 48 64">
    <rect x="14" y="4" width="20" height="10" rx="3" fill="#3a2a55"/>
    <path d="M10 20 Q10 14 16 14 L32 14 Q38 14 38 20 L38 52 Q38 62 28 62 L20 62 Q10 62 10 52 Z"
      fill="rgba(240,230,255,.9)" stroke="#d9c8f0" stroke-width="2"/>${dots}
    <ellipse cx="17" cy="36" rx="3" ry="10" fill="rgba(255,255,255,.55)"/>
  </svg>`;
}
function buildShelf(){
  const sh=$('#shelf');sh.innerHTML='';
  const mk=(html,nm,idx,arr,ownKey,price,unlocked)=>{
    const el=document.createElement('div');
    el.className='item'+(unlocked?'':' lock');
    el.innerHTML=html+`<div class="nm">${nm}</div>`+(unlocked?'':`<div class="price">🔒 ${price}</div>`);
    let sx=0,sy=0,moved=false;
    el.addEventListener('pointerdown',ev=>{ev.stopPropagation();sx=ev.clientX;sy=ev.clientY;moved=false;ac();});
    el.addEventListener('pointermove',ev=>{if(Math.hypot(ev.clientX-sx,ev.clientY-sy)>9)moved=true;});
    el.addEventListener('pointerup',ev=>{ev.stopPropagation();if(!moved)pickItem(idx,arr,ownKey,el);});
    sh.appendChild(el);
    return el;
  };
  if(step===2)POLISH.forEach((p,i)=>{
    const el=mk(svgBottle(p.c,p.c2),p.n,i,'P','polishIdx',p.price,save.up.includes(i));
    if(nail.polishIdx===i)el.classList.add('sel');
    if(client.wishP===i)el.querySelector('.nm').textContent='💕 '+p.n;
  });
  if(step===3)GLITTER.forEach((g,i)=>{
    const el=mk(svgJar(g.c),g.n,i,'G','glitterIdx',g.price,save.ug.includes(i));
    if(nail.glitterIdx===i)el.classList.add('sel');
    if(client.wishG===i)el.querySelector('.nm').textContent='💕 '+g.n;
  });
  if(step===4)DECOR.forEach((d,i)=>{
    const el=mk(`<div class="em">${d.e}</div>`,'',i,'D','decorIdx',d.price,save.ud.includes(i));
    if(nail.decorIdx===i)el.classList.add('sel');
  });
  sh.style.display=(step>=2)?'flex':'none';
  $('#doneBtn').style.display=(step===4)?'block':'none';
}
function pickItem(idx,arr,key,el){
  const data=arr==='P'?POLISH:arr==='G'?GLITTER:DECOR;
  const list=arr==='P'?save.up:arr==='G'?save.ug:save.ud;
  const item=data[idx];
  if(!list.includes(idx)){
    if(save.coins>=item.price){
      save.coins-=item.price;list.push(idx);store();updCoins(true);
      sfx.unlock();toast('Открыто! 🎉');
      nail[key]=idx;buildShelf();
    }else{
      sfx.err();el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');
      toast(`Нужно ещё ${item.price-save.coins} 🪙`);
    }
    return;
  }
  nail[key]=idx;sfx.pop();
  [...$('#shelf').children].forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  hideTut();
  if((step===2&&!nail.polished)||(step===3&&!nail.glittered))setTimeout(showTut,250); // рука → на ноготь
}
let toastT=null;
function toast(t){
  const el=$('#toast');el.textContent=t;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1800);
}

/* tutorial pointer */
let tutSeen=false;
function showTut(){
  const t=$('#tut');t.className='';tutSeen=false;
  const x=L.cx-14,y=L.ny+L.nh*0.4;
  t.style.left=x+'px';t.style.top=y+'px';
  if(step===0){t.style.top=(L.ny-20)+'px';t.classList.add('tap');}
  else if(step===1){t.style.top=(L.ny+10)+'px';t.classList.add('slideX');}
  else if(step===2||step===3){
    const chosen=(step===2?nail.polishIdx:nail.glitterIdx)>=0;
    if(chosen){t.classList.add('slideY');}          // выбрал цвет — води по ногтю
    else{                                            // ещё не выбрал — указываем на полку
      const dockTop=$('#dock').getBoundingClientRect().top;
      t.style.top=(dockTop+34)+'px';t.classList.add('tap');
    }
  }
  else if(step===4){t.classList.add('tap');}
}
function hideTut(){if(!tutSeen){tutSeen=true;$('#tut').className='';}}

function setupStep(){
  stepLock=false;
  $('#stepLabel').textContent=STEPS[step].lbl;
  $('#stepHint').textContent=STEPS[step].hint;
  if(step===4&&(nail.decorIdx===undefined||nail.decorIdx<0))nail.decorIdx=0;
  buildDots();buildShelf();
  setTimeout(showTut,400);
}
function advance(){
  if(stepLock)return;stepLock=true;
  hideTut();sfx.done();
  burst(L.cx,L.ny+L.nh*0.4,'✓');
  setTimeout(()=>{
    step++;
    if(step>4){finishClient();}
    else setupStep();
  },750);
}
function burst(x,y,label){
  for(let i=0;i<16;i++){
    const a=rand(0,Math.PI*2);
    particles.push({t:'dot',x,y,vx:Math.cos(a)*rand(1,4),vy:Math.sin(a)*rand(1,4)-1,
      life:1,dec:rand(.02,.04),size:rand(3,7),color:pick(['#ffd447','#ff79c1','#7ceccb','#fff'])});
  }
  if(label)particles.push({t:'txt',x,y,vx:0,vy:-1.2,life:1,dec:.016,size:54,txt:label});
}

/* ================= gameplay input ================= */
let ptrDown=false,ptrId=null,px=0,py=0,ppx=0,ppy=0;

function toUnit(x,y){return{x:(x-L.nx)/L.nw*UW,y:(y-L.ny)/L.nh*UH};}
function inNail(x,y,pad){
  const u=toUnit(x,y);
  if(pad){return u.x>-pad&&u.x<UW+pad&&u.y>-pad&&u.y<UH+pad;}
  return pctx.isPointInPath(nailPath,u.x,u.y);
}

cv.addEventListener('pointerdown',e=>{
  e.preventDefault();ac();
  if(screen!=='salon'||stepLock)return;
  if(ptrId!==null)return;
  ptrId=e.pointerId;ptrDown=true;
  px=ppx=e.clientX;py=ppy=e.clientY;
  if(step===0)doClip(e.clientX,e.clientY);
  else if(step===2)doPaint();
  else if(step===3)doGlitter();
  else if(step===4)doDecor(e.clientX,e.clientY);
});
window.addEventListener('pointermove',e=>{
  if(!ptrDown||e.pointerId!==ptrId)return;
  ppx=px;ppy=py;px=e.clientX;py=e.clientY;
  if(screen!=='salon'||stepLock)return;
  if(step===1)doFile();
  if(step===2)doPaint();
  if(step===3)doGlitter();
});
function endPtr(e){if(e.pointerId===ptrId){ptrDown=false;ptrId=null;}}
window.addEventListener('pointerup',endPtr);
window.addEventListener('pointercancel',endPtr);
document.addEventListener('touchmove',e=>{if(e.target===cv)e.preventDefault();},{passive:false});
document.addEventListener('gesturestart',e=>e.preventDefault());

/* ---- step 0: clip ---- */
function doClip(x,y){
  const now=performance.now();
  if(now-lastClipT<260)return;
  if(y>L.ny+L.nh*0.75)return; // близко к кончику
  lastClipT=now;
  nail.clips--;nail.extra=nail.clips/3;
  hideTut();sfx.snip();
  /* летящий кусочек */
  particles.push({t:'chip',x:L.cx+rand(-L.nw*.3,L.nw*.3),y:L.ny-L.extraMax*nail.extra,
    vx:rand(-3,3),vy:rand(-6,-3),rot:rand(0,6),vr:rand(-.3,.3),life:1,dec:.02,size:L.nw*.24});
  burst(x,y);
  if(nail.clips<=0){nail.extra=0;advance();}
}
/* ---- step 1: file ---- */
function doFile(){
  const dx=Math.abs(px-ppx);
  if(dx<2)return;
  if(Math.abs(py-(L.ny+L.nh*0.15))>L.nh*0.85)return;
  hideTut();
  nail.fileAcc+=dx;
  const need=L.nw*4.5;
  nail.rough=clamp(1-nail.fileAcc/need,0,1);
  const now=performance.now();
  if(now-lastFileSfx>120){lastFileSfx=now;sfx.file();}
  if(Math.random()<.5)particles.push({t:'dot',x:px+rand(-8,8),y:L.ny+rand(-4,10),
    vx:rand(-1,1),vy:rand(.5,2),life:1,dec:.03,size:rand(1.5,3),color:'rgba(255,240,230,.9)'});
  if(nail.rough<=0)advance();
}
/* ---- step 2: paint ---- */
function doPaint(){
  if(nail.polishIdx<0){toast('Выбери цвет внизу! 👇');return;}
  if(!inNail(px,py,90))return;
  hideTut();
  const p=POLISH[nail.polishIdx];
  const u1=toUnit(ppx,ppy),u2=toUnit(px,py);
  pctx.save();
  pctx.lineCap='round';pctx.lineJoin='round';pctx.lineWidth=110;
  let col=p.c;
  if(p.unicorn)col=`hsl(${(u2.y/UH*240+280)%360} 92% 72%)`;
  pctx.strokeStyle=col;
  pctx.beginPath();pctx.moveTo(u1.x,u1.y);pctx.lineTo(u2.x,u2.y);pctx.stroke();
  pctx.restore();
  /* mark coverage */
  const dist=Math.hypot(u2.x-u1.x,u2.y-u1.y),steps=Math.max(1,Math.ceil(dist/24));
  for(let i=0;i<=steps;i++){
    const sx=lerp(u1.x,u2.x,i/steps),sy=lerp(u1.y,u2.y,i/steps);
    for(let gy=0;gy<GY;gy++)for(let gx=0;gx<GX;gx++){
      const ci=gy*GX+gx;
      if(!insideCell[ci]||paintedCell[ci])continue;
      if(Math.hypot((gx+.5)*CW-sx,(gy+.5)*CH-sy)<66)paintedCell[ci]=true;
    }
  }
  if(Math.random()<.25)sfx.file();
  let n=0;for(let i=0;i<paintedCell.length;i++)if(paintedCell[i]&&insideCell[i])n++;
  if(n/insideTotal>=.82&&!nail.polished)completePolish();
}
function completePolish(){
  nail.polished=true;
  const p=POLISH[nail.polishIdx];
  const g=pctx.createLinearGradient(0,0,0,UH);
  if(p.unicorn){
    [['#ff7ad9',0],['#ffb15c',.25],['#fff06b',.5],['#6be8a0',.75],['#7ab8ff',1]]
      .forEach(s=>g.addColorStop(s[1],s[0]));
  }else{g.addColorStop(0,p.c2);g.addColorStop(1,p.c);}
  pctx.save();pctx.fillStyle=g;pctx.fillRect(0,0,UW,UH);
  if(p.gold)for(let i=0;i<60;i++){
    pctx.fillStyle='rgba(255,255,255,'+rand(.2,.6)+')';
    pctx.beginPath();pctx.arc(rand(0,UW),rand(0,UH),rand(1,3),0,7);pctx.fill();
  }
  pctx.restore();
  shineT=0;
  advance();
}
/* ---- step 3: glitter ---- */
function doGlitter(){
  if(nail.glitterIdx<0){toast('Выбери блёстки внизу! 👇');return;}
  if(!inNail(px,py,110))return;
  hideTut();
  const g=GLITTER[nail.glitterIdx];
  const u=toUnit(px,py);
  for(let i=0;i<3;i++){
    const gx=u.x+rand(-46,46),gy=u.y+rand(-46,46);
    if(!pctx.isPointInPath(nailPath,gx,gy))continue;
    const col=g.c==='rainbow'?`hsl(${rand(0,360)} 95% 70%)`:g.c;
    pctx.save();
    pctx.fillStyle=col;pctx.globalAlpha=rand(.7,1);
    pctx.translate(gx,gy);pctx.rotate(rand(0,Math.PI));
    if(Math.random()<.3){ /* звёздочка */
      pctx.fillRect(-1.5,-6,3,12);pctx.fillRect(-6,-1.5,12,3);
    }else{pctx.beginPath();pctx.arc(0,0,rand(2.5,5),0,7);pctx.fill();}
    pctx.restore();
    nail.glitterN++;
  }
  /* осыпающиеся мимо */
  if(Math.random()<.4)particles.push({t:'dot',x:px+rand(-20,20),y:py,
    vx:rand(-.5,.5),vy:rand(1,3),life:1,dec:.02,size:rand(2,3.5),
    color:g.c==='rainbow'?`hsl(${rand(0,360)} 95% 70%)`:g.c});
  if(Math.random()<.2)sfx.sparkle();
  if(nail.glitterN>=100&&!nail.glittered){nail.glittered=true;advance();}
}
/* ---- step 4: decor ---- */
function doDecor(x,y){
  if(nail.decorIdx===undefined||nail.decorIdx<0)nail.decorIdx=0;
  if(!inNail(x,y,20))return;
  if(nail.decors.length>=6){toast('Красота! Жми ГОТОВО ✨');return;}
  hideTut();
  const u=toUnit(x,y);
  nail.decors.push({e:DECOR[nail.decorIdx].e,x:clamp(u.x,40,UW-40),y:clamp(u.y,40,UH-40),t:performance.now()});
  sfx.place();burst(x,y);
}

/* ================= client finish / result ================= */
function finishClient(){
  const colorOk=nail.polishIdx===client.wishP;
  const glitOk=nail.glitterIdx===client.wishG;
  resultStars=1+(colorOk?1:0)+(glitOk?1:0);
  const reward=20+resultStars*15;
  save.coins+=reward;save.served++;store();
  /* preroll hand design */
  handDesign=[];
  for(let f=0;f<5;f++){
    const dots=[];
    for(let i=0;i<26;i++)dots.push({x:Math.random(),y:Math.random(),r:rand(.8,2),
      hue:Math.random()*360,star:Math.random()<.25});
    handDesign.push(dots);
  }
  screen='result';
  $('#dock').classList.add('hid');
  $('#hud').style.opacity='0';$('#stepDots').style.opacity='0';$('#tut').className='';
  const rs=$('#resultScr');rs.classList.remove('hid');
  $('#resPhrase').textContent=resultStars===3?'ИДЕАЛЬНО! Именно так я хотела! 💖'
    :resultStars===2?'Как красиво! Спасибо! 🌟':'Очень мило! 🌸';
  $('#resCoins').textContent='+'+reward+' 🪙';
  const stars=[...document.querySelectorAll('.star')];
  stars.forEach((s,i)=>{s.className='star'+(i<resultStars?'':' off');});
  stars.forEach((s,i)=>{if(i<resultStars)setTimeout(()=>{s.classList.add('on');sfx.coin();},500+i*350);});
  setTimeout(()=>sfx.fanfare(),400);
  setTimeout(()=>updCoins(true),1200);
  /* конфетти */
  particles=[];
  for(let i=0;i<90;i++)particles.push({t:'conf',x:rand(0,W),y:rand(-H*.4,0),
    vx:rand(-1,1),vy:rand(2,5),rot:rand(0,6),vr:rand(-.2,.2),life:1,dec:rand(.003,.007),
    size:rand(6,12),color:pick(['#ffd447','#ff79c1','#7ceccb','#8fd8ff','#c9a0f7','#fff'])});
  for(let i=0;i<8;i++)particles.push({t:'heart',x:rand(W*.2,W*.8),y:rand(H*.5,H*.9),
    vx:rand(-.3,.3),vy:rand(-1.2,-.6),life:1,dec:.004,size:rand(18,30)});
}

/* ================= drawing ================= */
function skinGrad(x0,x1){
  const g=ctx.createLinearGradient(x0,0,x1,0);
  g.addColorStop(0,'#eab188');g.addColorStop(.22,'#f7cca8');
  g.addColorStop(.5,'#fad8b8');g.addColorStop(.78,'#f2c29b');g.addColorStop(1,'#e0a37c');
  return g;
}
function drawBG(t){
  const g=ctx.createLinearGradient(0,0,W*.3,H);
  const hueShift=Math.sin(t/6000)*10;
  g.addColorStop(0,`hsl(${325+hueShift} 100% 72%)`);
  g.addColorStop(.6,`hsl(${272+hueShift} 75% 62%)`);
  g.addColorStop(1,`hsl(${262+hueShift} 70% 48%)`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();
  for(const b of bokeh){
    const y=(b.y*H-t/1000*b.s)%H;const yy=y<0?y+H:y;
    ctx.globalAlpha=b.a;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(b.x*W,yy,b.r,0,7);ctx.fill();
  }
  ctx.restore();
}
function topArcY(x){ /* y кромки ногтя на экране для x */
  const u=clamp((x-L.cx)/(L.nw/2),-1,1);
  return L.ny+L.nh*0.10*(1-Math.sqrt(1-u*u))+L.nh*0.035;
}
function drawFreeEdge(eh,rough){
  if(eh<=0.5)return;
  const x0=L.nx+L.nw*0.055,x1=L.nx+L.nw*0.945,n=14;
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<=n;i++){
    const x=lerp(x0,x1,i/n);
    const j=(jag[i]||.5)-.5;
    const y=topArcY(x)-eh+j*rough*10;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  for(let i=n;i>=0;i--){
    const x=lerp(x0,x1,i/n);
    ctx.lineTo(x,topArcY(x)+3);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(255,246,236,.94)';
  ctx.shadowColor='rgba(120,50,90,.25)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
  ctx.fill();
  ctx.restore();
  /* линия улыбки */
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<=n;i++){const x=lerp(x0,x1,i/n);const y=topArcY(x)+2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();ctx.restore();
}
function drawFinger(t){
  const sway=Math.sin(t/1800)*2.5;
  ctx.save();ctx.translate(sway,0);
  const {fw,tipY,cx}=L;
  const left=cx-fw/2,right=cx+fw/2;
  /* тень-свечение */
  ctx.save();
  ctx.shadowColor='rgba(70,10,80,.35)';ctx.shadowBlur=44;ctx.shadowOffsetY=10;
  ctx.beginPath();
  ctx.moveTo(left,H+60);ctx.lineTo(left,tipY+fw*0.55);
  ctx.bezierCurveTo(left,tipY+fw*0.12,cx-fw*0.34,tipY,cx,tipY);
  ctx.bezierCurveTo(cx+fw*0.34,tipY,right,tipY+fw*0.12,right,tipY+fw*0.55);
  ctx.lineTo(right,H+60);ctx.closePath();
  ctx.fillStyle=skinGrad(left,right);ctx.fill();
  ctx.restore();
  /* складки сустава */
  ctx.strokeStyle='rgba(190,120,90,.30)';ctx.lineWidth=3;ctx.lineCap='round';
  for(let k=0;k<2;k++){
    const y=tipY+fw*1.45+k*14;
    ctx.beginPath();ctx.moveTo(cx-fw*0.33,y);
    ctx.quadraticCurveTo(cx,y+10,cx+fw*0.33,y);ctx.stroke();
  }
  /* ноготь */
  drawNail(t);
  ctx.restore();
  return sway;
}
function drawNail(t){
  const {nx,ny,nw,nh}=L;
  /* тень под ногтем */
  ctx.save();
  ctx.translate(nx,ny+3);ctx.scale(nw/UW,nh/UH);
  ctx.fillStyle='rgba(150,80,60,.30)';ctx.fill(nailPath);
  ctx.restore();
  /* пластина */
  ctx.save();
  ctx.translate(nx,ny);ctx.scale(nw/UW,nh/UH);
  const base=ctx.createLinearGradient(0,0,0,UH);
  base.addColorStop(0,'#f8e3da');base.addColorStop(1,'#f1cdc2');
  ctx.fillStyle=base;ctx.fill(nailPath);
  /* лунула у кутикулы */
  ctx.save();ctx.clip(nailPath);
  ctx.fillStyle='rgba(255,248,244,.85)';
  ctx.beginPath();ctx.ellipse(UW/2,UH+8,UW*0.34,60,0,0,7);ctx.fill();
  /* лак */
  ctx.drawImage(pcv,0,0);
  /* глянец */
  ctx.fillStyle='rgba(255,255,255,.30)';
  ctx.beginPath();ctx.ellipse(UW*0.27,UH*0.30,34,110,-0.14,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();ctx.ellipse(UW*0.72,UH*0.16,18,52,0.2,0,7);ctx.fill();
  /* shine sweep */
  if(shineT>=0&&shineT<=1){
    const sx=lerp(-UW*0.6,UW*1.4,shineT);
    const g=ctx.createLinearGradient(sx-70,0,sx+70,0);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(.5,'rgba(255,255,255,.65)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,UW,UH);
  }
  ctx.restore();
  /* контур */
  ctx.strokeStyle='rgba(120,60,50,.20)';ctx.lineWidth=5;ctx.stroke(nailPath);
  ctx.restore();
  /* свободный край / шероховатость */
  if(screen==='salon'){
    if(step===0)drawFreeEdge(L.extraMax*nail.extra+6,1);
    else if(step===1)drawFreeEdge(3+nail.rough*10,nail.rough);
  }
  /* декор */
  for(const d of nail.decors){
    const age=clamp((performance.now()-d.t)/300,0,1);
    const s=age<1?1.4-0.4*age*age-(1-age)*1.4*(1-age):1; // overshoot
    const pop=age>=1?1:(0.2+1.25*age-0.45*age*age);
    const sx=nx+d.x/UW*nw,sy=ny+d.y/UH*nh;
    ctx.save();ctx.translate(sx,sy);ctx.scale(pop,pop);
    ctx.font=Math.round(nw*0.26)+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(80,20,60,.35)';ctx.shadowBlur=4;ctx.shadowOffsetY=2;
    ctx.fillText(d.e,0,0);
    ctx.restore();
  }
}

const FILE_DOTS=[];for(let i=0;i<26;i++)FILE_DOTS.push([rand(-63,63),rand(-10,8)]);
const JAR_DOTS=[];for(let i=0;i<8;i++)JAR_DOTS.push([rand(-12,12),rand(-22,24),rand(0,360)]);
/* tool sprites following pointer */
function drawTool(){
  if(screen!=='salon')return;
  const showFollow=ptrDown&&!stepLock;
  ctx.save();
  if(step===0){
    ctx.font='58px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.save();ctx.translate(showFollow?px+34:L.cx+L.nw*0.75,showFollow?py-26:L.ny-8);
    ctx.rotate(-0.5);ctx.fillText('✂️',0,0);ctx.restore();
  }else if(step===1&&showFollow){
    ctx.translate(px,py-14);ctx.rotate(-0.18);
    const w=150,h=34;
    ctx.fillStyle='#f45fae';
    ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,17);ctx.fill();
    ctx.fillStyle='#ffd0e8';
    ctx.beginPath();ctx.roundRect(-w/2+8,-h/2+6,w-16,h-12,10);ctx.fill();
    ctx.fillStyle='rgba(180,60,120,.5)';
    for(const d of FILE_DOTS)ctx.fillRect(d[0],d[1],2,2);
  }else if(step===2&&showFollow&&nail.polishIdx>=0){
    const p=POLISH[nail.polishIdx];
    ctx.translate(px+6,py);ctx.rotate(0.5);
    ctx.fillStyle='#3a2a55';
    ctx.beginPath();ctx.roundRect(-7,-110,14,86,7);ctx.fill();
    ctx.fillStyle=p.c;
    ctx.beginPath();ctx.moveTo(-8,-26);ctx.quadraticCurveTo(0,10,8,-26);ctx.closePath();ctx.fill();
  }else if(step===3&&showFollow&&nail.glitterIdx>=0){
    ctx.translate(px+26,py-40);ctx.rotate(0.9);
    ctx.fillStyle='rgba(240,230,255,.95)';
    ctx.beginPath();ctx.roundRect(-18,-30,36,60,10);ctx.fill();
    ctx.fillStyle='#3a2a55';
    ctx.beginPath();ctx.roundRect(-18,-44,36,16,5);ctx.fill();
    const g=GLITTER[nail.glitterIdx];
    for(const d of JAR_DOTS){
      ctx.fillStyle=g.c==='rainbow'?`hsl(${d[2]} 95% 65%)`:g.c;
      ctx.beginPath();ctx.arc(d[0],d[1],2,0,7);ctx.fill();
    }
  }
  ctx.restore();
}
/* particles */
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;
    if(p.t==='conf'||p.t==='chip'){p.vy+=.08;p.rot+=p.vr;}
    if(p.t==='dot')p.vy+=.05;
    if(p.life<=0||p.y>H+60){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=clamp(p.life,0,1);
    if(p.t==='dot'){
      ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();
    }else if(p.t==='conf'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    }else if(p.t==='chip'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle='rgba(255,246,236,.95)';
      ctx.beginPath();ctx.moveTo(-p.size/2,0);ctx.lineTo(-p.size*.15,-p.size*.3);
      ctx.lineTo(p.size*.25,-p.size*.15);ctx.lineTo(p.size/2,0);ctx.lineTo(0,p.size*.22);
      ctx.closePath();ctx.fill();
    }else if(p.t==='txt'){
      ctx.font='900 '+p.size+'px ui-rounded,system-ui';
      ctx.textAlign='center';ctx.fillStyle='#2fd6a8';
      ctx.shadowColor='rgba(0,0,0,.25)';ctx.shadowBlur=6;
      ctx.fillText(p.txt,p.x,p.y);
    }else if(p.t==='heart'){
      ctx.font=p.size+'px system-ui';ctx.textAlign='center';
      ctx.fillText('💖',p.x,p.y);
    }
    ctx.restore();
  }
}

/* кончики пальцев в системе 128×128: ang — наклон, w — ширина ногтя, fi — индекс блёсток */
const HAND_TIPS=[
  {tx:22.8, ty:30.3, ang:-0.30, w:12.5, fi:0},  // мизинец
  {tx:41.6, ty:11.2, ang:-0.10, w:14.6, fi:1},  // безымянный

  {tx:110.7,ty:61.1, ang: 0.62, w:16.2, fi:4},  // большой
];
function nailShapePath(nw){
  const h=nw*1.25;
  ctx.beginPath();
  ctx.moveTo(-nw/2,nw*0.2);
  ctx.quadraticCurveTo(-nw/2,-nw*0.55,0,-nw*0.55);
  ctx.quadraticCurveTo(nw/2,-nw*0.55,nw/2,nw*0.2);
  ctx.lineTo(nw*0.42,h*0.7);
  ctx.quadraticCurveTo(0,h*0.9,-nw*0.42,h*0.7);
  ctx.closePath();
}
/* рисует один ноготь (центр в 0,0; caller уже повернул) */
function drawHandNail(nw,p,g,dots,decor){
  const top=-nw*0.55, bottom=nw*1.125, spanY=bottom-top, left=-nw/2, wid=nw;
  ctx.save();
  /* тень-ложе */
  ctx.save();ctx.translate(0,nw*0.06);nailShapePath(nw);
  ctx.fillStyle='rgba(150,90,70,.28)';ctx.fill();ctx.restore();
  /* лак */
  const gr=ctx.createLinearGradient(0,top,0,bottom);
  if(p.unicorn){[['#ff7ad9',0],['#ffb15c',.28],['#fff06b',.5],['#6be8a0',.72],['#7ab8ff',1]].forEach(s=>gr.addColorStop(s[1],s[0]));}
  else{gr.addColorStop(0,p.c2);gr.addColorStop(1,p.c);}
  nailShapePath(nw);ctx.fillStyle=gr;ctx.fill();
  /* блёстки / декор / глянец — по маске ногтя */
  ctx.save();nailShapePath(nw);ctx.clip();
  if(dots)for(const d of dots){
    ctx.fillStyle=g.c==='rainbow'?('hsl('+d.hue+' 95% 70%)'):g.c;ctx.globalAlpha=.9;
    const dx=left+d.x*wid, dy=top+d.y*spanY;
    if(d.star){ctx.fillRect(dx-1,dy-nw*0.09,2,nw*0.18);ctx.fillRect(dx-nw*0.09,dy-1,nw*0.18,2);}
    else{ctx.beginPath();ctx.arc(dx,dy,nw*0.045,0,7);ctx.fill();}
  }
  ctx.globalAlpha=1;
  if(decor){ctx.font=(nw*0.72)+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(decor,0,nw*0.30);}
  ctx.fillStyle='rgba(255,255,255,.36)';
  ctx.beginPath();ctx.ellipse(-nw*0.16,-nw*0.06,nw*0.12,nw*0.42,-0.1,0,7);ctx.fill();
  ctx.restore();
  /* контур ногтя */
  nailShapePath(nw);ctx.lineWidth=Math.max(1,nw*0.03);ctx.strokeStyle='rgba(120,60,50,.18)';ctx.stroke();
  ctx.restore();
}
function drawHand(t){
  const p=POLISH[nail.polishIdx<0?0:nail.polishIdx];
  const g=GLITTER[nail.glitterIdx<0?0:nail.glitterIdx];
  const sway=Math.sin(t/2400)*5, tilt=Math.sin(t/2900)*0.02;
  const cx=W/2+sway;
  const TW=clamp(W*0.86,300,560);      // ширина руки
  const s=TW/128;
  const handTop=clamp(H*0.235, 178, 260);   // верх пальцев ниже шапки результата
  const ox=cx-64*s, oy=handTop-4*s;
  const pivotY=oy+64*s;
  ctx.save();
  ctx.translate(cx,pivotY);ctx.rotate(tilt);ctx.translate(-cx,-pivotY);

  /* рука */
  ctx.save();ctx.translate(ox,oy);ctx.scale(s,s);
  ctx.save();ctx.shadowColor='rgba(74,14,86,.34)';ctx.shadowBlur=7;ctx.shadowOffsetY=4;
  ctx.fillStyle='#c98a63';ctx.fill(HAND_BASE);ctx.restore();
  const sg=ctx.createLinearGradient(18,0,120,0);
  sg.addColorStop(0,'#d99a70');sg.addColorStop(.22,'#f0c39c');sg.addColorStop(.5,'#fbdcbf');
  sg.addColorStop(.78,'#eebd96');sg.addColorStop(1,'#d1946c');
  ctx.fillStyle=sg;ctx.fill(HAND_BASE);
  ctx.save();ctx.clip(HAND_BASE);
  ctx.fillStyle='rgba(150,92,62,.15)';HAND_SHADE.forEach(pp=>ctx.fill(pp));
  const tl=ctx.createLinearGradient(0,0,0,66);
  tl.addColorStop(0,'rgba(255,255,255,.16)');tl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=tl;ctx.fillRect(0,0,128,76);
  const er=ctx.createLinearGradient(128,0,102,0);
  er.addColorStop(0,'rgba(150,84,62,.16)');er.addColorStop(1,'rgba(150,84,62,0)');
  ctx.fillStyle=er;ctx.fillRect(98,0,30,128);
  ctx.restore();
  ctx.lineWidth=1.1;ctx.strokeStyle='rgba(120,66,50,.16)';ctx.stroke(HAND_BASE);
  ctx.restore();

  /* ногти на кончиках */
  HAND_TIPS.forEach(T=>{
    const sx=ox+T.tx*s, sy=oy+T.ty*s, nw=T.w*s;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(T.ang);
    let decor=null;
    if(nail.decors.length){
      if(T.fi===2)decor=nail.decors[0].e;
      else if(T.fi===3&&nail.decors.length>1)decor=nail.decors[1].e;
    }
    drawHandNail(nw,p,g,handDesign?handDesign[T.fi]:null,decor);
    ctx.restore();
  });

  ctx.restore();
}

/* ================= main loop ================= */
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  drawBG(t);
  if(screen==='salon'){
    drawFinger(t);
    drawTool();
    if(shineT>=0){shineT+=(t-lastT)/700;if(shineT>1.2)shineT=-1;}  // одноразовый блик, затем стоп
  }else if(screen==='result'){
    drawHand(t);
  }
  drawParticles();
  lastT=t;
}
requestAnimationFrame(loop);
