<style>
  :root{
    --candy:#ff79c1; --orchid:#a35ce8; --deep:#6d2fbf;
    --cream:#fff6fb; --berry:#43104f; --sun:#ffd447; --mint:#2fd6a8;
    --shadow:0 8px 24px rgba(80,10,90,.28);
    --safe-t:max(env(safe-area-inset-top,0px), 22px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;position:fixed;width:100%;overscroll-behavior:none}
  body{
    font-family:ui-rounded,-apple-system,"SF Pro Rounded",system-ui,sans-serif;
    background:linear-gradient(170deg,var(--candy),var(--orchid) 70%,var(--deep));
    color:var(--berry);
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
  }
  #cv{position:fixed;inset:0;display:block;touch-action:none}
  #ui{position:fixed;inset:0;pointer-events:none}
  button{font-family:inherit;border:none;cursor:pointer;touch-action:manipulation}

  /* ---------- центральная сцена (телефонная колонка на любом экране) ---------- */
  #stg{
    position:absolute;top:0;bottom:0;left:50%;transform:translateX(-50%);
    width:min(100vw,62vh);pointer-events:none;
  }
  #stg>*{pointer-events:none}

  /* ---------- HUD ---------- */
  #hud{
    position:absolute;top:calc(var(--safe-t) + 8px);left:0;right:0;
    display:flex;justify-content:space-between;align-items:flex-start;padding:0 12px;
    transition:opacity .3s;
  }
  #clientChip{pointer-events:auto;display:flex;align-items:flex-end;position:relative}
  #ava{
    width:60px;height:60px;border-radius:50%;background:linear-gradient(160deg,#ffe3f2,#ffc2e2);
    border:3px solid #fff;box-shadow:var(--shadow);
    display:flex;align-items:center;justify-content:center;font-size:35px;
  }
  #bubble{
    background:#fff;border-radius:18px 18px 18px 6px;padding:7px 10px;margin-left:-6px;margin-bottom:30px;
    box-shadow:var(--shadow);display:flex;align-items:center;gap:8px;
    animation:bob 2.6s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  #bubble .lbl{font-size:10px;font-weight:800;color:#b04a8f;line-height:1.2;text-align:left;max-width:86px}
  #wishCv{width:30px;height:41px;border-radius:8px}
  #coinPill{
    background:var(--cream);border-radius:999px;padding:8px 13px 8px 11px;box-shadow:var(--shadow);
    display:flex;align-items:center;gap:6px;font-weight:900;font-size:18px;
    font-variant-numeric:tabular-nums;color:var(--berry);
  }
  #coinPill .c{font-size:19px}
  #coinPill.pop{animation:coinpop .45s ease}
  @keyframes coinpop{30%{transform:scale(1.22)}}

  #sndBtn,#homeBtn{
    pointer-events:auto;position:absolute;right:12px;
    width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.38);
    font-size:19px;box-shadow:0 3px 10px rgba(80,10,90,.2);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
  }
  #sndBtn{top:calc(var(--safe-t) + 78px)}
  #homeBtn{top:calc(var(--safe-t) + 126px);display:none}
  #sndBtn:active,#homeBtn:active{transform:scale(.9)}

  /* ---------- прогресс шагов ---------- */
  #stepDots{
    position:absolute;top:calc(var(--safe-t) + 82px);left:50%;transform:translateX(-50%);
    display:flex;gap:8px;transition:opacity .3s;
  }
  .dot{
    width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.26);
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,.75);transition:all .3s;position:relative;
  }
  .dot svg{width:17px;height:17px;display:block}
  .dot.cur{background:#fff;color:#d34a9a;transform:scale(1.2);box-shadow:0 4px 14px rgba(80,10,90,.35)}
  .dot.done{background:var(--mint);color:#fff}
  .dot.done::after{
    content:'✓';position:absolute;right:-3px;top:-3px;width:14px;height:14px;border-radius:50%;
    background:#fff;color:#17a67c;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }

  /* ---------- нижний док ---------- */
  #dock{
    position:absolute;left:0;right:0;bottom:0;padding:12px 0 calc(var(--safe-b) + 10px);
    background:linear-gradient(to top,rgba(255,246,251,.97) 80%,rgba(255,246,251,0));
    display:flex;flex-direction:column;align-items:center;gap:5px;
    transition:transform .35s ease;border-radius:26px 26px 0 0;
  }
  #dock.hid{transform:translateY(115%)}
  #stepLabel{font-size:20px;font-weight:900;letter-spacing:.2px;text-shadow:0 1px 0 #fff}
  #stepHint{font-size:13px;font-weight:700;color:#a45a92}
  #shelf{
    pointer-events:auto;
    display:flex;gap:10px;overflow-x:auto;max-width:100%;padding:8px 16px 10px;
    touch-action:pan-x;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  }
  #shelf::-webkit-scrollbar{display:none}
  .item{
    pointer-events:auto;position:relative;flex:0 0 auto;width:66px;height:84px;border-radius:18px;
    background:#fff;box-shadow:0 4px 12px rgba(80,10,90,.16);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    transition:transform .18s ease,box-shadow .18s ease;border:3px solid transparent;
  }
  .item.sel{transform:translateY(-8px) scale(1.06);border-color:var(--sun);box-shadow:0 10px 22px rgba(80,10,90,.3)}
  .item .em{font-size:34px;line-height:1}
  .item .nm{font-size:9px;font-weight:800;color:#b04a8f;white-space:nowrap}
  .item.lock{filter:grayscale(.85);opacity:.8}
  .item.lock .price{
    position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
    background:var(--sun);color:#6b4a00;font-size:10px;font-weight:900;border-radius:999px;
    padding:2px 8px;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .item.shake{animation:shake .4s}
  @keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

  #doneBtn{
    pointer-events:auto;display:none;margin-top:2px;
    background:linear-gradient(180deg,#4ff0c0,var(--mint));color:#04543c;
    font-size:19px;font-weight:900;padding:13px 42px;border-radius:999px;
    box-shadow:0 6px 0 #17a67c,0 12px 24px rgba(23,166,124,.4);
    animation:pulse 1.6s ease-in-out infinite;
  }
  #doneBtn:active{transform:translateY(4px);box-shadow:0 2px 0 #17a67c}
  @keyframes pulse{50%{transform:scale(1.05)}}

  /* ---------- обучающая рука ---------- */
  #tut{position:absolute;font-size:50px;pointer-events:none;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));display:none;z-index:5}
  #tut.tap{display:block;animation:tapA 1s ease-in-out infinite}
  #tut.slideX{display:block;animation:slideXA 1.3s ease-in-out infinite}
  #tut.slideY{display:block;animation:slideYA 1.3s ease-in-out infinite}
  @keyframes tapA{0%,100%{transform:scale(1) translateY(0)}40%{transform:scale(.78) translateY(8px)}}
  @keyframes slideXA{0%,100%{transform:translateX(-44px)}50%{transform:translateX(44px)}}
  @keyframes slideYA{0%,100%{transform:translateY(30px)}50%{transform:translateY(-42px)}}

  #toast{
    position:absolute;left:50%;bottom:230px;transform:translateX(-50%) translateY(20px);
    background:rgba(67,16,79,.9);color:#fff;font-weight:800;font-size:14px;
    padding:10px 20px;border-radius:999px;opacity:0;transition:all .3s;white-space:nowrap;z-index:6;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- экраны ---------- */
  .scr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    transition:opacity .45s ease,visibility .45s;}
  .scr.hid{opacity:0;visibility:hidden}

  #titleScr{
    pointer-events:auto;justify-content:center;gap:8px;
    background:linear-gradient(160deg,#ff8fcb,#c76df0 55%,#7a3ad0);
    background-size:100% 130%;animation:bgshift 8s ease-in-out infinite alternate;
  }
  @keyframes bgshift{to{background-position:0 100%}}
  .spark{position:absolute;font-size:22px;opacity:.85;animation:floatUp linear infinite}
  @keyframes floatUp{from{transform:translateY(30px) scale(.7);opacity:0}
    15%{opacity:.9}85%{opacity:.9}to{transform:translateY(-105vh) scale(1.15);opacity:0}}
  #logoNail{font-size:84px;filter:drop-shadow(0 10px 18px rgba(60,0,70,.4));animation:bob 3s ease-in-out infinite}
  #titleScr h1{
    font-size:50px;font-weight:900;color:#fff;letter-spacing:1px;text-align:center;line-height:.98;
    text-shadow:0 3px 0 #e550a2,0 6px 0 #b23a86,0 14px 30px rgba(60,0,70,.45);
  }
  #titleScr .sub{font-size:15px;font-weight:800;color:#ffe3f5;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
  #playBtn{
    margin-top:30px;background:linear-gradient(180deg,#ffe470,var(--sun));color:#6b4a00;
    font-size:25px;font-weight:900;padding:17px 60px;border-radius:999px;letter-spacing:1px;
    box-shadow:0 7px 0 #d9a916,0 16px 34px rgba(90,50,0,.35);animation:pulse 1.8s ease-in-out infinite;

function tone(f,d,type,v,f2){
  if(save.muted)return;const a=ac();if(!a)return;
  try{
    const o=a.createOscillator(),g=a.createGain();
    o.type=type||'sine';o.frequency.setValueAtTime(f,a.currentTime);
    if(f2)o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+d);
    g.gain.setValueAtTime(v||.12,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d+.02);
  }catch(e){}
}
function hiss(d,v,fc){
  if(save.muted)return;const a=ac();if(!a)return;
  try{
    const n=Math.floor(a.sampleRate*d),buf=a.createBuffer(1,n,a.sampleRate),ch=buf.getChannelData(0);
    for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1)*(1-i/n);
    const src=a.createBufferSource();src.buffer=buf;
    const fl=a.createBiquadFilter();fl.type='bandpass';fl.frequency.value=fc||2500;fl.Q.value=.8;
    const g=a.createGain();g.gain.value=v||.2;
    src.connect(fl);fl.connect(g);g.connect(a.destination);src.start();
  }catch(e){}

/* сетка покрытия — на каждую форму своя */
const GX=12,GY=16,CW=UW/GX,CH=UH/GY;
const coverCache={};
function coverFor(shapeIdx){
  const id=SHAPES[shapeIdx].id;
  if(coverCache[id])return coverCache[id];
  const inside=[];let total=0;
  for(let gy=0;gy<GY;gy++)for(let gx=0;gx<GX;gx++){
    const inp=pctx.isPointInPath(SHAPES[shapeIdx].p,(gx+.5)*CW,(gy+.5)*CH);
    inside.push(inp);if(inp)total++;
  }
  return coverCache[id]={inside,total};
}
let paintedCell=new Array(GX*GY).fill(false);

/* верхняя дуга формы (для свободного края, линии улыбки, френча) */
const arcCache={};
function topArc(shapeIdx){
  const id=SHAPES[shapeIdx].id;
  if(arcCache[id])return arcCache[id];
  const pts=[];
  for(let i=0;i<=20;i++){
    const x=lerp(UW*0.05,UW*0.95,i/20);
    let y=null;
    for(let yy=0;yy<=220;yy+=3){
      if(pctx.isPointInPath(SHAPES[shapeIdx].p,x,yy)){y=yy;break;}
    }
    if(y!==null)pts.push({x,y});
  }
  return arcCache[id]=pts;
}
function arcYat(arc,x){
  if(!arc.length)return 30;
  if(x<=arc[0].x)return arc[0].y;
  if(x>=arc[arc.length-1].x)return arc[arc.length-1].y;
  for(let i=1;i<arc.length;i++){
    if(x<=arc[i].x){
      const t=(x-arc[i-1].x)/(arc[i].x-arc[i-1].x);
      return lerp(arc[i-1].y,arc[i].y,t);
    }
  }
  return arc[arc.length-1].y;
}

const GOLD_DOTS=[];for(let i=0;i<60;i++)GOLD_DOTS.push([Math.random()*384,Math.random()*512,0.2+Math.random()*0.4,1+Math.random()*2]);
function paintPolishInto(c,p,shapeIdx,full){
  /* заливает юнит-пространство цветом лака p (градиент/單орог/золото/френч) */
  const g=c.createLinearGradient(0,0,0,UH);
  if(p.unicorn){
    [['#ff7ad9',0],['#ffb15c',.25],['#fff06b',.5],['#6be8a0',.75],['#7ab8ff',1]].forEach(s=>g.addColorStop(s[1],s[0]));
  }else{g.addColorStop(0,p.c2);g.addColorStop(1,p.c);}
  c.fillStyle=g;c.fillRect(0,0,UW,UH);
  if(p.gold){
    for(const d of GOLD_DOTS){
      c.fillStyle='rgba(255,255,255,'+d[2]+')';
      c.beginPath();c.arc(d[0],d[1],d[3],0,7);c.fill();
    }
  }
  if(p.french){
    const arc=topArc(shapeIdx<0?0:shapeIdx);
    c.save();
    c.beginPath();
    c.moveTo(-30,arcYat(arc,0)+150);
    for(const pt of arc)c.lineTo(pt.x,pt.y+150);
    c.lineTo(UW+30,arcYat(arc,UW)+150);
    c.lineTo(UW+30,-80);c.lineTo(-30,-80);c.closePath();
    c.fillStyle='#ffffff';c.fill();
    c.strokeStyle='rgba(225,190,178,.85)';c.lineWidth=5;
    c.beginPath();
    arc.forEach((pt,i)=>{i?c.lineTo(pt.x,pt.y+150):c.moveTo(pt.x,pt.y+150);});
    c.stroke();
    c.restore();
  }
}
/* универсальный рендер готового ногтя (превью/альбом/рука) в текущей трансформации ctx2 */
function renderNailInto(c,x,y,w,o){
  const s=w/UW;
  const shape=SHAPES[o.shapeIdx<0?0:o.shapeIdx];
  c.save();
  c.translate(x,y);c.scale(s,s);
  c.save();c.translate(0,10);c.fillStyle='rgba(140,80,60,.30)';c.fill(shape.p);c.restore();
  if(o.polishIdx>=0){
    c.save();c.clip(shape.p);
    paintPolishInto(c,POLISH[o.polishIdx],o.shapeIdx,true);
    c.restore();
  }else{
    const base=c.createLinearGradient(0,0,0,UH);
    base.addColorStop(0,'#f8e3da');base.addColorStop(1,'#f1cdc2');
    c.fillStyle=base;c.fill(shape.p);
  }
  c.save();c.clip(shape.p);
  if(o.dots&&o.glitterIdx>=0){
    const gl=GLITTER[o.glitterIdx];
    for(const d of o.dots){
      c.fillStyle=gl.c==='rainbow'?('hsl('+d.hue+' 95% 70%)'):gl.c;
      c.globalAlpha=.9;
      const dx=d.x*UW,dy=d.y*UH;
      if(d.star){c.fillRect(dx-4,dy-16,8,32);c.fillRect(dx-16,dy-4,32,8);}
      else{c.beginPath();c.arc(dx,dy,9,0,7);c.fill();}
    }
    c.globalAlpha=1;
  }
  if(o.decors){
    c.font='120px system-ui';c.textAlign='center';c.textBaseline='middle';
    o.decors.forEach((d,k)=>{if(k<3)c.fillText(d.e,d.x,d.y);});
  }
  c.fillStyle='rgba(255,255,255,.32)';
  c.beginPath();c.ellipse(UW*0.28,UH*0.30,40,116,-0.12,0,7);c.fill();
  c.fillStyle='rgba(255,255,255,.16)';
  c.beginPath();c.ellipse(UW*0.72,UH*0.16,18,52,0.2,0,7);c.fill();
  c.restore();
  c.strokeStyle='rgba(120,60,50,.20)';c.lineWidth=6;c.stroke(shape.p);
  c.restore();
}

let ptrDown=false,ptrId=null,px=0,py=0,ppx=0,ppy=0;
function toUnit(x,y){return{x:(x-L.nx)/L.nw*UW,y:(y-L.ny)/L.nh*UH};}
function activeShape(){return SHAPES[nail.shapeIdx<0?0:nail.shapeIdx];}
function inNail(x,y,pad){
  const u=toUnit(x,y);
  if(pad){return u.x>-pad&&u.x<UW+pad&&u.y>-pad&&u.y<UH+pad;}

/* ---- шаг 0: стрижка по сегментам ---- */
function doClip(x,y){
  const now=performance.now();
  if(now-lastClipT<240)return;
  if(y>L.ny+L.nh*0.75)return;
  const u=toUnit(x,y);
  const alive=nail.segs.map((v,i)=>v>0?i:-1).filter(i=>i>=0);
  if(!alive.length)return;
  let segIdx=clamp(Math.floor(u.x/(UW/3)),0,2);
  if(nail.segs[segIdx]<=0)segIdx=alive[0];
  lastClipT=now;
  nail.segs[segIdx]=0;
  hideTut();sfx.snip();
  clipX=x;snipAnim=1;
  const segCx=L.nx+(segIdx+0.5)*(L.nw/3);
  particles.push({t:'chip',x:segCx,y:L.ny-L.EH*0.5,
    vx:rand(-3,3),vy:rand(-6,-3),rot:rand(0,6),vr:rand(-.3,.3),life:1,dec:.02,size:L.nw*.26});
  burst(x,y);
  if(nail.segs.every(s=>s<=0))advance();
}
/* ---- шаг 1: форма + пилка ---- */
function doFile(){
  if(nail.shapeIdx<0){
    const now=performance.now();
    if(now-lastShapeToast>1500){lastShapeToast=now;toast('Сначала выбери форму 👇');}
    return;
  }
  const dx=Math.abs(px-ppx);
  if(dx<2)return;
  if(Math.abs(py-(L.ny+L.nh*0.15))>L.nh*0.9)return;
  hideTut();
  nail.fileAcc+=dx;
  const need=L.nw*4.5;
  nail.rough=clamp(1-nail.fileAcc/need,0,1);
  const now=performance.now();
  if(now-lastFileSfx>120){lastFileSfx=now;sfx.file();}
  if(Math.random()<.5)particles.push({t:'dot',x:px+rand(-8,8),y:L.ny+rand(-4,10),
    vx:rand(-1,1),vy:rand(.5,2),life:1,dec:.03,size:rand(1.5,3),color:'rgba(255,240,230,.9)'});
  if(nail.rough<=0)advance();
}
/* ---- шаг 2: покраска ---- */
function doPaint(){
  if(nail.polishIdx<0){toast('Выбери цвет внизу! 👇');return;}
  if(!inNail(px,py,90))return;
  hideTut();
  const p=POLISH[nail.polishIdx];
  const u1=toUnit(ppx,ppy),u2=toUnit(px,py);
  pctx.save();
  pctx.lineCap='round';pctx.lineJoin='round';pctx.lineWidth=110;
  let col=p.c;
  if(p.unicorn)col=`hsl(${(u2.y/UH*240+280)%360} 92% 72%)`;
  pctx.strokeStyle=col;
  pctx.beginPath();
  if(u1.x===u2.x&&u1.y===u2.y){pctx.fillStyle=col;pctx.arc(u2.x,u2.y,55,0,Math.PI*2);pctx.fill();}
  else{pctx.moveTo(u1.x,u1.y);pctx.lineTo(u2.x,u2.y);pctx.stroke();}
  pctx.restore();
  const cover=coverFor(nail.shapeIdx<0?0:nail.shapeIdx);
  const dist=Math.hypot(u2.x-u1.x,u2.y-u1.y),steps=Math.max(1,Math.ceil(dist/24));
  for(let i=0;i<=steps;i++){
    const sx=lerp(u1.x,u2.x,i/steps),sy=lerp(u1.y,u2.y,i/steps);
    for(let gy=0;gy<GY;gy++)for(let gx=0;gx<GX;gx++){
      const ci=gy*GX+gx;
      if(!cover.inside[ci]||paintedCell[ci])continue;
      if(Math.hypot((gx+.5)*CW-sx,(gy+.5)*CH-sy)<55)paintedCell[ci]=true;
    }
  }
  if(Math.random()<.25)sfx.file();
  let n=0;for(let i=0;i<paintedCell.length;i++)if(paintedCell[i]&&cover.inside[i])n++;
  if(n/cover.total>=.82&&!nail.polished)completePolish();
}
function completePolish(){
  nail.polished=true;
  pctx.save();
  paintPolishInto(pctx,POLISH[nail.polishIdx],nail.shapeIdx,true);
  pctx.restore();
  shineT=0;
  advance();
}
/* ---- шаг 3: блёстки ---- */
function doGlitter(){
  if(nail.glitterIdx<0){toast('Выбери блёстки внизу! 👇');return;}
  if(!inNail(px,py,110))return;
  hideTut();
  const g=GLITTER[nail.glitterIdx];
  const u=toUnit(px,py);
  for(let i=0;i<3;i++){
    const gx=u.x+rand(-46,46),gy=u.y+rand(-46,46);
    if(!pctx.isPointInPath(activeShape().p,gx,gy))continue;
    const col=g.c==='rainbow'?`hsl(${rand(0,360)} 95% 70%)`:g.c;
    pctx.save();
    pctx.fillStyle=col;pctx.globalAlpha=rand(.7,1);
    pctx.translate(gx,gy);pctx.rotate(rand(0,Math.PI));
    if(Math.random()<.3){
      pctx.fillRect(-1.5,-6,3,12);pctx.fillRect(-6,-1.5,12,3);
    }else{pctx.beginPath();pctx.arc(0,0,rand(2.5,5),0,7);pctx.fill();}
    pctx.restore();
    nail.glitterN++;
  }
  if(Math.random()<.4)particles.push({t:'dot',x:px+rand(-20,20),y:py,
    vx:rand(-.5,.5),vy:rand(1,3),life:1,dec:.02,size:rand(2,3.5),
    color:g.c==='rainbow'?`hsl(${rand(0,360)} 95% 70%)`:g.c});
  if(Math.random()<.2)sfx.sparkle();
  if(nail.glitterN>=100&&!nail.glittered){nail.glittered=true;advance();}
}
/* ---- шаг 4: декор ---- */
function doDecor(x,y){
  if(nail.decorIdx===undefined||nail.decorIdx<0)nail.decorIdx=0;
  if(!inNail(x,y,20))return;
  if(nail.decors.length>=6){toast('Красота! Жми ГОТОВО ✨');return;}
  hideTut();
  const u=toUnit(x,y);
  nail.decors.push({e:DECOR[nail.decorIdx].e,x:clamp(u.x,40,UW-40),y:clamp(u.y,60,UH-40),t:performance.now()});
  sfx.place();burst(x,y);
}

function openOrder(cta){
  orderOpen=true;

function skinGrad(x0,x1){
  const g=ctx.createLinearGradient(x0,0,x1,0);
  g.addColorStop(0,'#eab188');g.addColorStop(.22,'#f7cca8');
  g.addColorStop(.5,'#fad8b8');g.addColorStop(.78,'#f2c29b');g.addColorStop(1,'#e0a37c');
  return g;
}
function drawBG(t){
  const g=ctx.createLinearGradient(0,0,W*.3,H);
  const hueShift=Math.sin(t/6000)*10;
  g.addColorStop(0,`hsl(${325+hueShift} 100% 72%)`);
  g.addColorStop(.6,`hsl(${272+hueShift} 75% 62%)`);
  g.addColorStop(1,`hsl(${262+hueShift} 70% 48%)`);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.save();
  for(const b of bokeh){
    const y=(b.y*H-t/1000*b.s)%H;const yy=y<0?y+H:y;
    ctx.globalAlpha=b.a;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(b.x*W,yy,b.r,0,7);ctx.fill();
  }
  ctx.restore();
}
function drawFinger(t){
  const sway=Math.sin(t/1800)*2.5;
  ctx.save();ctx.translate(sway,0);
  const {fw,tipY,cx}=L;
  const left=cx-fw/2,right=cx+fw/2;
  ctx.save();
  ctx.shadowColor='rgba(70,10,80,.35)';ctx.shadowBlur=44;ctx.shadowOffsetY=10;
  ctx.beginPath();
  ctx.moveTo(left,H+60);ctx.lineTo(left,tipY+fw*0.55);
  ctx.bezierCurveTo(left,tipY+fw*0.12,cx-fw*0.34,tipY,cx,tipY);
  ctx.bezierCurveTo(cx+fw*0.34,tipY,right,tipY+fw*0.12,right,tipY+fw*0.55);
  ctx.lineTo(right,H+60);ctx.closePath();
  ctx.fillStyle=skinGrad(left,right);ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(190,120,90,.30)';ctx.lineWidth=3;ctx.lineCap='round';
  for(let k=0;k<2;k++){
    const y=tipY+fw*1.45+k*14;
    ctx.beginPath();ctx.moveTo(cx-fw*0.33,y);
    ctx.quadraticCurveTo(cx,y+10,cx+fw*0.33,y);ctx.stroke();
  }
  drawNailLive(t);
  ctx.restore();
  return sway;
}
function drawNailLive(t){
  const {nx,ny,nw,nh}=L;

    ctx.restore();
  }
  /* тень под пластиной */

  const base=ctx.createLinearGradient(0,0,0,UH);

  ctx.beginPath();ctx.ellipse(UW*0.27,UH*0.30,34,110,-0.14,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.beginPath();ctx.ellipse(UW*0.72,UH*0.16,18,52,0.2,0,7);ctx.fill();
  if(shineT>=0&&shineT<=1){
    const sx=lerp(-UW*0.6,UW*1.4,shineT);
    const g=ctx.createLinearGradient(sx-70,0,sx+70,0);
    g.addColorStop(0,'rgba(255,255,255,0)');g.addColorStop(.5,'rgba(255,255,255,.65)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,UW,UH);
  }
  ctx.restore();
  ctx.strokeStyle='rgba(120,60,50,.20)';ctx.lineWidth=5;ctx.stroke(shape.p);
  /* свободный отросший край (шаг 0) — естественное продолжение пластины */

    const arc=topArc(nail.shapeIdx);
    ctx.save();
    ctx.strokeStyle=`rgba(230,195,175,${0.5*nail.rough})`;ctx.lineWidth=2;
    ctx.beginPath();
    arc.forEach((pt,i)=>{
      const sx2=nx+pt.x/UW*nw, sy2=ny+(pt.y+jag[i%18]*8*nail.rough-4)/UH*nh;
      i?ctx.lineTo(sx2,sy2):ctx.moveTo(sx2,sy2);
    });
    ctx.stroke();ctx.restore();
  }
  /* декор */
  for(const d of nail.decors){
    const age=clamp((performance.now()-d.t)/300,0,1);

    ctx.save();ctx.translate(sx,sy);ctx.scale(pop,pop);
    ctx.font=Math.round(nw*0.26)+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='rgba(80,20,60,.35)';ctx.shadowBlur=4;ctx.shadowOffsetY=2;
    ctx.fillText(d.e,0,0);
    ctx.restore();
  }
}
/* свободный край в юнит-координатах (вызывается внутри трансформации ногтя) */
function drawFreeEdgeUnit(){
  const arc=topArc(0);
  const EHu=150;
  const x0=UW*0.10,x1=UW*0.90;
  for(let s=0;s<3;s++){
    if(nail.segs[s]<=0)continue;
    const xa=lerp(x0,x1,s/3),xb=lerp(x0,x1,(s+1)/3);
    ctx.save();
    ctx.beginPath();
    const N=6;
    /* нижняя кромка — по дуге пластины */
    for(let i=0;i<=N;i++){
      const x=lerp(xa,xb,i/N);
      const y=arcYat(arc,x)+6;
      i?ctx.lineTo(x,y):ctx.moveTo(x,y);
    }
    /* верхняя кромка — рваная, сужена к центру */
    for(let i=N;i>=0;i--){
      const x=lerp(xa,xb,i/N);
      const xt=lerp(x,UW/2,0.07);
      const j=jag[(s*6+i)%18];
      const y=arcYat(arc,x)-EHu*(0.75+0.25*j)+j*26;
      ctx.lineTo(xt,y);
    }
    ctx.closePath();
    const g=ctx.createLinearGradient(0,-EHu,0,40);
    g.addColorStop(0,'rgba(255,251,242,.96)');
    g.addColorStop(1,'rgba(250,238,224,.88)');
    ctx.fillStyle=g;
    ctx.shadowColor='rgba(120,50,90,.28)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;
    ctx.fill();
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.strokeStyle='rgba(228,196,178,.7)';ctx.lineWidth=3;ctx.stroke();
    /* лёгкие продольные волокна */
    ctx.strokeStyle='rgba(220,190,170,.35)';ctx.lineWidth=2;
    for(let k=1;k<=2;k++){
      const x=lerp(xa,xb,k/3);
      ctx.beginPath();ctx.moveTo(x,arcYat(arc,x)+2);
      ctx.lineTo(lerp(x,UW/2,0.05),arcYat(arc,x)-EHu*0.7);
      ctx.stroke();
    }
    ctx.restore();
  }
  /* линия улыбки */
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=4;
  ctx.beginPath();
  arc.forEach((pt,i)=>{i?ctx.lineTo(pt.x,pt.y+5):ctx.moveTo(pt.x,pt.y+5);});
  ctx.stroke();
  ctx.restore();
}

const FILE_DOTS=[];for(let i=0;i<26;i++)FILE_DOTS.push([rand(-63,63),rand(-10,8)]);
const JAR_DOTS=[];for(let i=0;i<8;i++)JAR_DOTS.push([rand(-12,12),rand(-22,24),rand(0,360)]);
function drawTool(t){

    const targetX=clipX===null?L.cx+L.nw*0.38:Math.min(clipX,L.cx+L.nw*0.55);

    ctx.fillStyle=p.french?'#fff':p.c;
    ctx.beginPath();ctx.moveTo(-8,-22);ctx.quadraticCurveTo(0,14,8,-22);ctx.closePath();ctx.fill();
  }else if(step===3&&showFollow&&nail.glitterIdx>=0){
    ctx.translate(px+26,py-40);ctx.rotate(0.9);
    ctx.fillStyle='rgba(240,230,255,.95)';
    ctx.beginPath();ctx.roundRect(-18,-30,36,60,10);ctx.fill();
    ctx.fillStyle='#3a2a55';
    ctx.beginPath();ctx.roundRect(-18,-44,36,16,5);ctx.fill();
    const g=GLITTER[nail.glitterIdx];
    for(const d of JAR_DOTS){
      ctx.fillStyle=g.c==='rainbow'?`hsl(${d[2]} 95% 65%)`:g.c;
      ctx.beginPath();ctx.arc(d[0],d[1],2,0,7);ctx.fill();
    }
  }
  ctx.restore();

/* частицы */
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.dec;
    if(p.t==='conf'||p.t==='chip'){p.vy+=.08;p.rot+=p.vr;}
    if(p.t==='dot')p.vy+=.05;
    if(p.life<=0||p.y>H+60){particles.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=clamp(p.life,0,1);
    if(p.t==='dot'){
      ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,7);ctx.fill();
    }else if(p.t==='conf'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);
    }else if(p.t==='chip'){
      ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.fillStyle='rgba(255,248,238,.96)';
      ctx.beginPath();ctx.moveTo(-p.size/2,0);ctx.lineTo(-p.size*.15,-p.size*.3);
      ctx.lineTo(p.size*.25,-p.size*.15);ctx.lineTo(p.size/2,0);ctx.lineTo(0,p.size*.22);
      ctx.closePath();ctx.fill();
    }else if(p.t==='txt'){
      ctx.font='900 '+p.size+'px ui-rounded,system-ui';
      ctx.textAlign='center';ctx.fillStyle='#2fd6a8';
      ctx.shadowColor='rgba(0,0,0,.25)';ctx.shadowBlur=6;
      ctx.fillText(p.txt,p.x,p.y);
    }else if(p.t==='heart'){
      ctx.font=p.size+'px system-ui';ctx.textAlign='center';
      ctx.fillText('💖',p.x,p.y);
    }
    ctx.restore();
  }
}

const HAND_IMG=new Image();HAND_IMG.src='hand.png';

function handLayout(){

  let xs=[],xacc=0;
  F.forEach(f=>{xs.push(xacc+f.k*U/2);xacc+=f.k*U;});
  const total=xacc;
  const left=W/2-total/2;
  const tops=F.map(f=>midTop+f.dy*U);
  const kY=midTop+3.85*U;
  return {midTop,U,F,xs,total,left,tops,kY};
}
function buildHandSprite(){
  const Lo=handLayout();
  const {U,F,xs,total,tops,kY}=Lo;
  const scale=Math.min(DPR,2);
  const pad=U*0.25;
  const sx0=Lo.left-pad, sy0=Lo.midTop-pad;
  const sw=Math.ceil((total+pad*2)*scale), sh=Math.ceil((H-sy0)*scale);
  const cnv=document.createElement('canvas');cnv.width=sw;cnv.height=sh;
  const c2=cnv.getContext('2d');
  const img=c2.createImageData(sw,sh);
  const D=img.data;
  /* свет */
  let Lx=-0.36,Ly=-0.50,Lz=0.79;
  const Ll=Math.hypot(Lx,Ly,Lz);Lx/=Ll;Ly/=Ll;Lz/=Ll;
  /* цвета кожи */
  const A1=[253,219,182],A2=[242,187,146];       // альбедо верх/низ
  const SSS=[236,126,116];                        // подповерхностный тёплый
  const pw=total*1.005, pl=(total-pw)/2+pad;       // ладонь в локальных коорд.
  const prad=U*0.30, ptop=kY-sy0-U*0.10;
  const fx=[],fw=[],ft=[];
  F.forEach((f,i)=>{fx.push(xs[i]+pad);fw.push(f.k*U);ft.push(tops[i]-sy0);});
  const kYl=kY-sy0;
  const seams=[0,1,2].map(i=>fx[i]+fw[i]/2);
  const g=(v,s2)=>Math.exp(-v*v/s2);
  for(let py=0;py<sh;py++){
    const y=py/scale;
    for(let px2=0;px2<sw;px2++){
      const x=px2/scale;
      let nx=0,ny=0,nz=0,alpha=0,edge=1,crease=1,tipBlush=0,ao=1,knl=0;
      /* --- пальцы (приоритет) --- */
      let hit=-1,hx=0,hw2=0;
      for(let i=0;i<4;i++){
        const t=y-ft[i];
        if(t<0||y>kYl+U*0.55)continue;
        const r=fw[i]*0.465;
        let halfw;
        let nyl=0;
        if(t<r){                                   // купол кончика
          const q=1-(r-t)/r;
          halfw=r*Math.sqrt(Math.max(0,1-((r-t)/r)*((r-t)/r)));
          nyl=-(r-t)/r*0.85;
        }else{
          const Lf=kYl-ft[i];
          const c1=ft[i]+0.44*Lf, c2y=ft[i]+0.76*Lf;
          const bulge=1+0.030*g(y-c1,(U*0.28)*(U*0.28))+0.035*g(y-c2y,(U*0.30)*(U*0.30))
                       -0.020*g(y-(c1+c2y)/2,(U*0.34)*(U*0.34));
          halfw=r*Math.min(1.075,bulge)*(1+0.06*Math.max(0,(y-c2y)/(kYl-c2y||1)));
        }
        const dx=x-fx[i];
        if(Math.abs(dx)<=halfw+1.5){
          if(hit<0||Math.abs(dx)/halfw<Math.abs(hx)/hw2){hit=i;hx=dx;hw2=halfw;
            const q=Math.abs(dx)/halfw;
            edge=Math.min(1,(halfw+1.2-Math.abs(dx))/2.2);
            nx=dx/halfw;ny=nyl;nz=Math.sqrt(Math.max(0.02,1-nx*nx));
            /* складки суставов — мягкие 3D-борозды */
            if(t>=r){
              const Lf=kYl-ft[i];
              const c1=ft[i]+0.44*Lf, c2y=ft[i]+0.76*Lf;
              const fadeE=1-Math.min(1,Math.max(0,(q-0.45)/0.4));
              const d1=g(y-c1,(U*0.035)*(U*0.035));
              const d2=g(y-c2y,(U*0.04)*(U*0.04));
              crease=1-0.16*fadeE*Math.min(1.0,d1+d2);
            }
            tipBlush=Math.max(0,1-t/(fw[i]*1.4))*0.5;
          }
        }
      }
      if(hit<0){
        /* --- ладонь --- */
        if(y>=ptop){
          let inside=x>=pl&&x<=pl+pw;
          let ed=Math.min(x-pl,pl+pw-x);
          if(y<ptop+prad){
            const cyv=ptop+prad;
            if(x<pl+prad){const ddx=x-(pl+prad),ddy=y-cyv;ed=prad-Math.hypot(ddx,ddy);inside=ed>-1.5;}
            else if(x>pl+pw-prad){const ddx=x-(pl+pw-prad),ddy=y-cyv;ed=prad-Math.hypot(ddx,ddy);inside=ed>-1.5;}
            else ed=Math.min(ed,y-ptop);
          }
          if(inside){
            edge=Math.min(1,(ed+1.2)/2.2);
            const dxp=(x-(pl+pw/2))/(pw/2);
            nx=dxp*0.85;nz=Math.sqrt(Math.max(0.05,1-nx*nx));ny=0;
            if(y<ptop+U*0.5)ny=-(1-(y-ptop)/(U*0.5))*0.5;
            /* костяшки-бугорки */
            for(let i=0;i<4;i++){
              const bd2=((x-fx[i])*(x-fx[i])+(y-(kYl+U*0.14))*(y-(kYl+U*0.14)))/((U*0.30)*(U*0.30));
              knl+=0.20*Math.exp(-bd2);
            }
            /* ложбинки между костяшками */
            for(const sxx of seams){
              const vd2=((x-sxx)*(x-sxx)+(y-(kYl+U*0.10))*(y-(kYl+U*0.10)))/((U*0.26)*(U*0.26));
              ao-=0.18*Math.exp(-vd2);
            }
            hit=9;
          }
        }
      }else{
        /* AO швов между пальцами */
        for(const sxx of seams){
          const sd=(x-sxx)/(U*0.075);
          if(y>Math.max(ft[hit],0)+U*0.6)ao-=0.16*Math.exp(-sd*sd);
        }
      }
      const o=(py*sw+px2)*4;
      if(hit<0||edge<=0){D[o+3]=0;continue;}
      /* нормализация и свет */
      const nl=Math.hypot(nx,ny,nz)||1;nx/=nl;ny/=nl;nz/=nl;
      let dif=nx*Lx+ny*Ly+nz*Lz;
      dif=Math.max(0,(dif+0.42)/1.42);
      /* спекуляр (отражение к камере V=(0,0,1)) */
      const rz=2*dif*nz-Lz;
      let spec=Math.pow(Math.max(0,rz),30)*0.30*crease;
      /* альбедо по высоте + румянец кончика */
      const ty2=Math.min(1,Math.max(0,y/sh));
      let ar=A1[0]+(A2[0]-A1[0])*ty2, ag=A1[1]+(A2[1]-A1[1])*ty2, ab=A1[2]+(A2[2]-A1[2])*ty2;
      ar=ar+(255-ar)*tipBlush*0.25+(SSS[0]-ar)*tipBlush*0.30;
      ag=ag+(SSS[1]-ag)*tipBlush*0.28;
      ab=ab+(SSS[2]-ab)*tipBlush*0.28;
      /* SSS: в тени кожа теплеет, а не чернеет */
      const sssMix=0.42*(1-dif);
      ar=ar*(1-sssMix)+SSS[0]*sssMix;
      ag=ag*(1-sssMix)+SSS[1]*sssMix;
      ab=ab*(1-sssMix)+SSS[2]*sssMix;
      const li=(0.46+0.60*dif)*crease*ao+knl*(0.6+0.4*dif);
      let R=ar*li+spec*255, G=ag*li+spec*255, B=ab*li+spec*255;
      D[o]=R>255?255:R;D[o+1]=G>255?255:G;D[o+2]=B>255?255:B;
      D[o+3]=Math.max(0,Math.min(1,edge))*255;
    }
  }
  c2.putImageData(img,0,0);
  handSprite={cnv,sx0,sy0,w:sw/scale,h:sh/scale,layout:Lo};
}
let maniSprite=null,maniKey='';
function buildManiSprite(){
  /* запекаем руку+ногти в один спрайт — рассинхрон исключён */
  const y0=clamp(H*0.27,190,H*0.36);
  const dispH=H-y0+70;
  const dispW=dispH*HAND_ASPECT;
  const sc=Math.min(DPR,2);
  const cnv=document.createElement('canvas');
  cnv.width=Math.ceil(dispW*sc);cnv.height=Math.ceil(dispH*sc);
  const c=cnv.getContext('2d');
  c.scale(sc,sc);
  c.drawImage(HAND_IMG,0,0,dispW,dispH);
  NAIL_MAP.forEach((n,i)=>{
    const cx=n.x*dispW, cy=n.y*dispH, nw=n.w*dispW*1.38;
    let decors=null;
    if(nail.decors.length){
      if(i===1)decors=nail.decors.slice(0,2);
      else if(i===0&&nail.decors.length>2)decors=[nail.decors[2]];
    }
    c.save();c.translate(cx,cy);c.rotate(n.ang);
    renderNailInto(c,-nw/2,-nw*0.66,nw,{
      shapeIdx:nail.shapeIdx,polishIdx:nail.polishIdx,glitterIdx:nail.glitterIdx,
      dots:handDesign?handDesign[i]:null,decors});
    c.restore();
  });
  maniSprite={cnv,dispW,dispH,y0};
}
function drawHandImg(t){
  const key=[W,H,DPR,nail.shapeIdx,nail.polishIdx,nail.glitterIdx,nail.decors.length,save.served].join('|');
  if(!maniSprite||maniKey!==key){maniKey=key;buildManiSprite();}
  const sway=Math.sin(t/2400)*4, tilt=Math.sin(t/3100)*0.012;
  const {dispW,dispH,y0}=maniSprite;
  const ix=W/2-HAND_CX*dispW+sway, iy=y0;
  ctx.save();
  const pivX=W/2+sway,pivY=H*0.75;
  ctx.translate(pivX,pivY);ctx.rotate(tilt);ctx.translate(-pivX,-pivY);
  ctx.shadowColor='rgba(64,10,80,.45)';ctx.shadowBlur=42;ctx.shadowOffsetY=16;
  ctx.drawImage(maniSprite.cnv,ix,iy,dispW,dispH);
  ctx.restore();
}
function drawHand(t){
  if(HAND_IMG.complete&&HAND_IMG.naturalWidth){drawHandImg(t);return;}
  const key=W+'x'+H+'x'+DPR;
  if(!handSprite||handKey!==key){handKey=key;buildHandSprite();}
  const {U,F,xs,left,tops}=handSprite.layout;
  const sway=Math.sin(t/2400)*4, tilt=Math.sin(t/3100)*0.012;
  ctx.save();
  const pivX=W/2+sway,pivY=handSprite.layout.kY;
  ctx.translate(sway,0);
  ctx.translate(pivX-sway,pivY);ctx.rotate(tilt);ctx.translate(-(pivX-sway),-pivY);
  /* мягкая тень позади силуэта */
  ctx.save();
  ctx.shadowColor='rgba(64,10,80,.42)';ctx.shadowBlur=38;ctx.shadowOffsetY=14;
  ctx.drawImage(handSprite.cnv,handSprite.sx0,handSprite.sy0,handSprite.w,handSprite.h);
  ctx.restore();
  ctx.drawImage(handSprite.cnv,handSprite.sx0,handSprite.sy0,handSprite.w,handSprite.h);
  /* ногти с маникюром игрока */
  F.forEach((f,i)=>{
    const fxs=left+xs[i], w=f.k*U;
    const nw=w*0.70;
    let decors=null;
    if(nail.decors.length){
      if(i===1)decors=nail.decors.slice(0,2);
      else if(i===2&&nail.decors.length>2)decors=[nail.decors[2]];
    }
    renderNailInto(ctx,fxs-nw/2,tops[i]+U*0.045,nw,{
      shapeIdx:nail.shapeIdx,polishIdx:nail.polishIdx,glitterIdx:nail.glitterIdx,
      dots:handDesign?handDesign[i]:null,decors});
  });
  ctx.restore();
}
/* ================= главный цикл ================= */
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  drawBG(t);
  if(screen==='salon'){
    drawFinger(t);
    drawTool(t);
    if(shineT>=0){shineT+=(t-lastT)/700;if(shineT>1.2)shineT=-1;}
  }else if(screen==='result'){
    drawHand(t);
  }
  drawParticles();
  lastT=t;
}
requestAnimationFrame(loop);
